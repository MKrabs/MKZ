name: Release

# Trigger only on semver version tags.
# Normal commits to any branch are NOT affected.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # ── 1. Frontend tests ────────────────────────────────────────────────────────
  test-website:
    name: Test website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MKZ-website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: MKZ-website/package-lock.json

      - run: npm ci
      - run: npm run test:run

  # ── 2. PocketBase build check ────────────────────────────────────────────────
  check-pocketbase:
    name: Check pocketbase build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MKZ-pocketbase
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: MKZ-pocketbase/go.mod
          cache-dependency-path: MKZ-pocketbase/go.sum

      - run: go build ./...
      - run: go vet ./...

  # ── 3. Build & push Docker images ────────────────────────────────────────────
  release:
    name: Build and push images
    needs: [test-website, check-pocketbase]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      # Docker image names must be lowercase; GitHub usernames can be mixed-case.
      - name: Lowercase registry owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # QEMU / Buildx are only needed for cross-platform builds.
      # Removed: we only target linux/amd64 (matches the production server).

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── mkz (combined frontend + backend) ────────────────────────────────────
      - name: Build and push mkz
        uses: docker/build-push-action@v5
        with:
          context: .
          # amd64 only — the production server is x86_64.
          # arm64 was previously included but compiled via QEMU emulation,
          # adding ~7 minutes (401 s vs 50 s) for zero benefit.
          # Re-add linux/arm64 only if the server ever moves to ARM.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/mkz:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER_LC }}/mkz:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
