services:

  mkz:
    image: ghcr.io/mkrabs/mkz:${MKZ_VERSION:-latest}
    container_name: mkz
    restart: unless-stopped
    # No host port mapping needed — NPM reaches the container directly
    # via the shared Docker network using 'mkz:80'.
    # Uncomment below only if you need direct host access (e.g. for testing):
    # ports:
    #   - "${MKZ_PORT:-8998}:80"
    volumes:
      - ${MKZ_DATA_DIR:?MKZ_DATA_DIR required — e.g. /mnt/Toshiba/mkz}/pb_data:/app/pb_data
    networks:
      - proxy
    # PB_URL is optional — omit it (or set to "") for same-origin routing.
    # Only set it if PocketBase is exposed on a separate public domain.
    # environment:
    #   PB_URL: https://pb.yourdomain.com

networks:
  proxy:
    external: true
    name: ${NETWORK:-nginx_default}
