services:

  mkz-pocketbase:
    image: ghcr.io/mkrabs/mkz-pocketbase:${MKZ_VERSION:-latest}
    container_name: mkz-pocketbase
    restart: unless-stopped
    ports:
      - "${MKZ_PB_PORT:-8090}:8090"
    volumes:
      - ${MKZ_DATA_DIR:?MKZ_DATA_DIR required — e.g. /mnt/Toshiba/mkz}/pb_data:/app/pb_data
    networks:
      - proxy

  mkz-website:
    image: ghcr.io/mkrabs/mkz-website:${MKZ_VERSION:-latest}
    container_name: mkz-website
    restart: unless-stopped
    ports:
      - "${MKZ_WEB_PORT:-80}:80"
    environment:
      PB_URL: ${PB_URL:?PB_URL required — public URL the browser uses to reach PocketBase}
    networks:
      - proxy
    depends_on:
      - mkz-pocketbase

networks:
  proxy:
    external: true
    name: ${NETWORK:-nginx_default}
